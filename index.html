<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device_width, initial-scale=1.0">
    <title>YMCA Packing Checklist</title>
    <style>
        body {
            font-family: "Nunito", sans-serif;
            background-color: #FBF1DE;
            color: #0B5D5B;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        svg {
            display: block;
            margin: 0 auto;
            width: 100%;
            max-width: 300px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, select, button {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .checklist-item {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }
        .checklist-item input[type="checkbox"] {
            width: auto;
        }
        .checklist-item button {
            background-color: #FF6F5E;
            color: white;
            border: none;
            cursor: pointer;
            padding: 5px 10px;
            position: absolute;
            right: 0;
        }
        .empty-state {
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="header">YMCA Packing Checklist</h1>
        <svg viewBox="0 0 480 293" xmlns="http://www.w3.org/2000/svg"><path fill="#6c757d" d="M0 0v293h480V0z"/></svg>
        <div class="form-group">
            <label for="datePicker">Select Date:</label>
            <input type="date" id="datePicker">
            <button onclick="loadChecklist()">Load</button>
        </div>
        <div id="checklistContainer" class="form-group"></div>
        <div id="progressIndicator"></div>
        <div class="form-group">
            <label for="addItem">Add Item:</label>
            <input type="text" id="addItem">
            <button onclick="addItem()">Add</button>
        </div>
        <h2>History</h2>
        <ul id="historyList"></ul>
    </div>

    <script>
        function loadChecklist() {
            const datePicker = document.getElementById('datePicker');
            const date = datePicker.value;
            if (!date) {
                alert('Please select a date.');
                return;
            }
            localStorage.removeItem(`ymcaChecklist:trip:${date}`);
            populateChecklist(date);
        }

        function populateChecklist(date) {
            const checklistContainer = document.getElementById('checklistContainer');
            checklistContainer.innerHTML = '';
            let items = JSON.parse(localStorage.getItem(`ymcaChecklist:trip:${date}`)) || [];
            if (items.length === 0) {
                checklistContainer.innerHTML = '<div class="empty-state">No items packed yet.</div>';
                return;
            }
            const totalItems = items.length;
            let checkedItems = 0;
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = 'checklist-item';
                li.innerHTML = `
                    <input type="checkbox" ${item.checked ? 'checked' : ''} onclick="toggleCheck('${date}', '${item.id}')">
                    <span>${item.name}</span>
                    <button onclick="deleteItem('${date}', '${item.id}')">Delete</button>
                `;
                if (item.checked) {
                    checkedItems++;
                }
                checklistContainer.appendChild(li);
            });
            updateProgress(totalItems, checkedItems);
        }

        function toggleCheck(date, itemId) {
            const items = JSON.parse(localStorage.getItem(`ymcaChecklist:trip:${date}`)) || [];
            const item = items.find(i => i.id === itemId);
            if (item) {
                item.checked = !item.checked;
                localStorage.setItem(`ymcaChecklist:trip:${date}`, JSON.stringify(items));
                populateChecklist(date);
            }
        }

        function deleteItem(date, itemId) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            const items = JSON.parse(localStorage.getItem(`ymcaChecklist:trip:${date}`)) || [];
            localStorage.setItem(`ymcaChecklist:trip:${date}`, JSON.stringify(items.filter(i => i.id !== itemId)));
            populateChecklist(date);
        }

        function addItem() {
            const datePicker = document.getElementById('datePicker');
            const itemInput = document.getElementById('addItem');
            const date = datePicker.value;
            const itemName = itemInput.value.trim();
            if (!date || !itemName) {
                alert('Please select a date and enter an item.');
                return;
            }
            let items = JSON.parse(localStorage.getItem(`ymcaChecklist:trip:${date}`)) || [];
            const id = crypto.randomUUID() || Math.random().toString(36).substr(2, 9);
            items.push({ id, name: itemName, checked: false });
            localStorage.setItem(`ymcaChecklist:trip:${date}`, JSON.stringify(items));
            itemInput.value = '';
            populateChecklist(date);
        }

        function updateProgress(totalItems, checkedItems) {
            const progressIndicator = document.getElementById('progressIndicator');
            progressIndicator.textContent = `${checkedItems} of ${totalItems} packed`;
        }
    </script>
</body>
</html>
